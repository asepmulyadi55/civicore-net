services:
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: CiviCore.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./CiviCore.Api/wwwroot/public-media:/app/wwwroot/public-media
      - ./CiviCore.Api/App_Data/PrivateMedia:/app/App_Data/PrivateMedia

  web:
    build:
      context: ./CiviCore.Web
      dockerfile: Dockerfile
      args:
        - API_URL=http://api:8080
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080

  frontend:
    build:
      context: ./CiviCore.Frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
