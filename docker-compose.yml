services:
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: CiviCore.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - FrontendUrl=https://dwipapuri.amsite.click
      - ConnectionStrings__Redis=redis:6379
    volumes:
      - ./CiviCore.Api/wwwroot/public-media:/app/wwwroot/public-media
      - ./CiviCore.Api/App_Data/PrivateMedia:/app/App_Data/PrivateMedia
      # Serilog's rolling files, readable on the host at ./logs
      - ./logs:/app/logs
    # `docker compose logs` reads this. The json-file driver is UNBOUNDED by
    # default and will eventually fill the disk — cap it.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: ./CiviCore.Web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://api:8080
      - NEXT_PUBLIC_SITE_URL=https://dwipapuri.amsite.click

  frontend:
    build:
      context: ./CiviCore.Frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

volumes:
  redis_data:
