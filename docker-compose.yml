services:
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: CiviCore.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Redis=redis:6379
    volumes:
      - ./CiviCore.Api/wwwroot/public-media:/app/wwwroot/public-media
      - ./CiviCore.Api/App_Data/PrivateMedia:/app/App_Data/PrivateMedia

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: ./CiviCore.Web
      dockerfile: Dockerfile
      args:
        - API_URL=http://api:8080
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080

  frontend:
    build:
      context: ./CiviCore.Frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"

volumes:
  redis_data:
