services:
  api:
    build:
      context: .
      dockerfile: CiviCore.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  web:
    build:
      context: ./CiviCore.Web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./CiviCore.Frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
