name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      frontend: ${{ steps.filter.outputs.frontend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'CiviCore.Api/**'
              - 'CiviCore.Application/**'
              - 'CiviCore.Domain/**'
              - 'CiviCore.Infrastructure/**'
            web:
              - 'CiviCore.Web/**'
            frontend:
              - 'CiviCore.Frontend/**'
            compose:
              - 'docker-compose.yml'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run if at least one service changed
    if: |
      needs.detect-changes.outputs.api == 'true' ||
      needs.detect-changes.outputs.web == 'true' ||
      needs.detect-changes.outputs.frontend == 'true' ||
      needs.detect-changes.outputs.compose == 'true'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 20m
          envs: CHANGED_API,CHANGED_WEB,CHANGED_FRONTEND,CHANGED_COMPOSE
          script: |
            set -e
            cd ${{ secrets.PROJECT_PATH }}

            echo ">>> Pulling latest code..."
            git pull origin main

            # If docker-compose.yml changed, rebuild everything
            if [ "$CHANGED_COMPOSE" = "true" ]; then
              echo ">>> docker-compose.yml changed — rebuilding all services..."
              docker compose up -d --build
              exit 0
            fi

            # Selectively rebuild only changed services
            SERVICES=""

            if [ "$CHANGED_API" = "true" ]; then
              echo ">>> API changed — queuing rebuild: api"
              SERVICES="$SERVICES api"
            fi

            if [ "$CHANGED_WEB" = "true" ]; then
              echo ">>> Web changed — queuing rebuild: web"
              SERVICES="$SERVICES web"
            fi

            if [ "$CHANGED_FRONTEND" = "true" ]; then
              echo ">>> Frontend changed — queuing rebuild: frontend"
              SERVICES="$SERVICES frontend"
            fi

            if [ -n "$SERVICES" ]; then
              echo ">>> Building new images (website stays up during build):$SERVICES"
              docker compose build $SERVICES
              echo ">>> Restarting containers with new images (minimal downtime):$SERVICES"
              docker compose up -d $SERVICES
            fi

            echo ">>> Cleaning up unused Docker images..."
            docker image prune -f

            echo ">>> Deployment complete."
        env:
          CHANGED_API: ${{ needs.detect-changes.outputs.api }}
          CHANGED_WEB: ${{ needs.detect-changes.outputs.web }}
          CHANGED_FRONTEND: ${{ needs.detect-changes.outputs.frontend }}
          CHANGED_COMPOSE: ${{ needs.detect-changes.outputs.compose }}
